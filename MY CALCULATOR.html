<!DOCTYPE html>
<html>
<head>
    <title>My Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background-color: #34495e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.4);
            width: 280px;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 30px;
            text-align: right;
            background-color: #ecf0f1;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 55px;
            font-size: 22px;
            background-color: #bdc3c7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
        }

        button:hover {
            background-color: #95a5a6;
        }

        .operator { background-color: #e67e22; color: white; }
        .operator:hover { background-color: #d35400; }
        
        .equals { background-color: #27ae60; color: white; }
        .equals:hover { background-color: #2ecc71; }

        .clear { background-color: #e74c3c; color: white; }
        .clear:hover { background-color: #c0392b; }
        
        .zero { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled>

        <div class="keys">
            <!-- ROW 1: Clear, Backspace, Percentage, Divide -->
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="percentage()">%</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>

            <!-- ROW 2: 7, 8, 9, MULTIPLY -->
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button> <!-- MULTIPLY IS BACK! -->

            <!-- ROW 3: 4, 5, 6, Minus -->
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>

            <!-- ROW 4: 1, 2, 3, Plus -->
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>

            <!-- ROW 5: 0 (wide), Dot, Equals -->
            <button class="zero" onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendToDisplay(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function percentage() {
            let currentNumber = parseFloat(display.value);
            display.value = currentNumber / 100;
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>

</body>
</html>
